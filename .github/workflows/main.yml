name: Automated Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # إنشاء المجلد لو مش موجود
            sudo mkdir -p /var/www/my-app
            sudo chown -R $USER:$USER /var/www/my-app
            
            # Clone or pull
            if [ ! -d "/var/www/my-app/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git /var/www/my-app
            else
              cd /var/www/my-app
              # Discard any local changes and untracked files to avoid conflicts
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            fi

            cd /var/www/my-app

            # Install dependencies
            composer install --no-dev --optimize-autoloader

            # Run migrations and seeders
            php artisan migrate --force
            php artisan db:seed --class=StatisticSeeder --force

            # Clear all caches
            php artisan optimize:clear

            # Generate Swagger docs
            php artisan l5-swagger:generate

            # Ensure framework directories exist
            mkdir -p /var/www/my-app/storage/framework/{sessions,views,cache}

            # Fix permissions — php-fpm runs as apache not nginx
            sudo chown -R apache:apache /var/www/my-app/storage /var/www/my-app/bootstrap/cache
            sudo chmod -R 775 /var/www/my-app/storage /var/www/my-app/bootstrap/cache
            
            # Fix SELinux contexts (Crucial for CentOS/RedHat servers)
            sudo chcon -Rt httpd_sys_rw_content_t /var/www/my-app/storage 2>/dev/null || true
            sudo chcon -Rt httpd_sys_rw_content_t /var/www/my-app/bootstrap/cache 2>/dev/null || true
