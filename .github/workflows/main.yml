name: Automated Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # إنشاء المجلد لو مش موجود
            sudo mkdir -p /var/www/my-app
            sudo chown -R $USER:$USER /var/www/my-app
            
            # الدخول للمجلد وعمل Clone لو أول مرة، أو Pull لو موجود
            cd /var/www
            if [ ! -d "my-app/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git my-app
            else
              cd my-app && git pull origin main
            fi
            
            # تنفيذ أوامر لارفيل
            cd /var/www/my-app
            composer install --no-dev --optimize-autoloader
            
            # ضبط الصلاحيات لـ Nginx في كل مرة لضمان العمل
            sudo chown -R nginx:nginx /var/www/my-app
            sudo chmod -R 775 /var/www/my-app/storage
